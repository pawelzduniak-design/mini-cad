name: Build Windows release

# Run manually (Actions tab -> "Run workflow") to test the build: it produces a
# downloadable zip artifact but does NOT publish a release.
# Push a tag like v0.1.0 to build AND publish a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build exe
        run: python -m PyInstaller packaging/mini-cad.spec --noconfirm --distpath dist --workpath build/pyi

      - name: Zip
        run: Compress-Archive -Path dist/mini-cad/* -DestinationPath dist/mini-cad-windows.zip

      # Manual/test runs: keep the zip as a downloadable artifact, no release.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-cad-windows
          path: dist/mini-cad-windows.zip

      # Tag pushes only: publish the Release with the zip attached.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mini-cad-windows.zip
          generate_release_notes: true
